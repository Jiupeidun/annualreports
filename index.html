<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Annual Reports">
  <meta name="theme-color" content="#060815">
  <title>Financial Reports</title>
  <link rel="icon" href="favicon.ico">
  <style>
    :root {
      --page-w: 1120px;
      --edge: 40px;
      --radius: 8px;
      --sky-top: #060815;
      --sky-mid: #101b31;
      --ground: #07101d;
      --page-text: #f4f7fb;
      --muted-text: #a8b4c5;
      --meta-text: #f8fbff;
      --meta-muted-text: #c6d3e2;
      --surface-rgb: 17, 26, 41;
      --line-rgb: 198, 214, 238;
      --surface-alpha: .8;
      --line-alpha: .23;
      --accent: #8bd3ff;
      --solar-rgb: 139, 211, 255;
      --moon-rgb: 205, 224, 255;
      --horizon-rgb: 198, 214, 238;
      --counter-rgb: 139, 211, 255;
      --glow-alpha: .07;
      --glow-soft-alpha: .024;
      --sun-disc-alpha: 0;
      --moon-disc-alpha: 0;
      --moon-halo-alpha: .035;
      --counter-alpha: .018;
      --arc-alpha: .008;
      --grain-alpha: .012;
      --veil-alpha: .045;
      --beam-alpha: .008;
      --horizon-alpha: .05;
      --vignette-alpha: .1;
      --atmosphere-x: 50%;
      --atmosphere-y: 112%;
      --moon-x: 50%;
      --moon-y: 8%;
      --atmosphere-background:
        radial-gradient(circle at var(--atmosphere-x) var(--atmosphere-y), rgba(255, 249, 214, var(--sun-disc-alpha)) 0 1.8%, transparent 4.4%),
        radial-gradient(circle at var(--moon-x) var(--moon-y), rgba(var(--moon-rgb), var(--moon-disc-alpha)) 0 1.35%, transparent 3.4%),
        radial-gradient(34% 24% at var(--moon-x) var(--moon-y), rgba(var(--moon-rgb), var(--moon-halo-alpha)) 0%, transparent 72%),
        radial-gradient(60% 42% at calc(100% - var(--atmosphere-x)) 8%, rgba(var(--counter-rgb), var(--counter-alpha)) 0%, transparent 68%),
        radial-gradient(100% 44% at 50% 58%, rgba(var(--horizon-rgb), var(--horizon-alpha)) 0%, transparent 68%),
        radial-gradient(118% 82% at var(--atmosphere-x) var(--atmosphere-y), rgba(var(--solar-rgb), var(--glow-alpha)) 0%, rgba(var(--solar-rgb), var(--glow-soft-alpha)) 27%, transparent 62%),
        linear-gradient(180deg, rgba(var(--horizon-rgb), var(--veil-alpha)) 0%, transparent 42%),
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--ground) 100%);
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-weight: 300;
      font-synthesis: none;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--atmosphere-background);
    }

    body {
      position: relative;
      min-height: 100%;
      min-height: 100dvh;
      margin: 0;
      overflow-x: auto;
      background: var(--atmosphere-background);
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
      background: var(--atmosphere-background);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      position: relative;
      isolation: isolate;
      z-index: 1;
      overflow: hidden;
      min-width: calc(var(--page-w) + (var(--edge) * 2));
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: calc(var(--edge) + env(safe-area-inset-top, 0px)) 0 calc(var(--edge) + env(safe-area-inset-bottom, 0px));
      color: var(--page-text);
      background: var(--atmosphere-background);
      transition: background 900ms linear, color 700ms linear;
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .app::before {
      background:
        radial-gradient(92% 72% at var(--atmosphere-x) var(--atmosphere-y), transparent 0 40%, rgba(var(--horizon-rgb), var(--arc-alpha)) 40.2%, transparent 41.6%),
        radial-gradient(116% 78% at calc(100% - var(--atmosphere-x)) calc(100% - var(--atmosphere-y)), transparent 0 48%, rgba(var(--line-rgb), var(--arc-alpha)) 48.2%, transparent 49.4%),
        linear-gradient(116deg, transparent 0 37%, rgba(var(--line-rgb), var(--beam-alpha)) 37.16%, transparent 37.72% 100%),
        linear-gradient(64deg, transparent 0 61%, rgba(var(--horizon-rgb), var(--beam-alpha)) 61.16%, transparent 61.68% 100%);
      opacity: .62;
    }

    .app::after {
      background:
        radial-gradient(120% 86% at 50% 100%, rgba(0, 0, 0, var(--vignette-alpha)) 0%, transparent 58%),
        repeating-linear-gradient(102deg, rgba(var(--line-rgb), var(--grain-alpha)) 0 1px, transparent 1px 7px),
        linear-gradient(180deg, transparent 0%, rgba(var(--horizon-rgb), var(--horizon-alpha)) 49%, transparent 72%);
      mix-blend-mode: soft-light;
      opacity: .72;
    }

    .page {
      width: var(--page-w);
      margin: 0 auto;
    }

    .masthead {
      min-height: 56px;
      display: grid;
      place-items: center;
      margin-bottom: 56px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1.2;
      font-weight: 300;
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
    }

    .reports {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 56px 24px;
    }

    .report-link {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto;
      gap: 18px;
      contain: layout paint style;
      color: var(--page-text);
      transition: color 700ms linear;
    }

    .report-link:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 52%, transparent);
      outline-offset: 4px;
      border-radius: var(--radius);
    }

    .report-picture {
      display: block;
      min-width: 0;
    }

    .report-cover {
      width: 144px;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      display: block;
      border-radius: var(--radius);
      background: rgba(var(--surface-rgb), var(--surface-alpha));
      transition: background 700ms linear;
    }

    .report-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .report-year {
      display: block;
      color: var(--meta-text);
      font-size: 1.08rem;
      font-weight: 300;
      line-height: 1.1;
      text-shadow: 0 1px 10px rgba(0, 0, 0, .12);
      transition: color 700ms linear;
    }

    .report-period {
      display: block;
      margin-top: 6px;
      color: var(--meta-muted-text);
      font-size: .76rem;
      font-weight: 300;
      line-height: 1.3;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .1);
      transition: color 700ms linear;
      white-space: nowrap;
    }

    .report-link:hover .report-year,
    .report-link:focus-visible .report-year {
      color: var(--meta-text);
    }

    .report-link:hover .report-period,
    .report-link:focus-visible .report-period {
      color: var(--meta-text);
    }

    footer {
      margin-top: 80px;
      color: var(--muted-text);
      font-size: .75rem;
      line-height: 1.35;
      opacity: .58;
      text-align: center;
      transition: color 700ms linear;
    }

    footer p {
      margin: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .app,
      .report-link,
      .report-cover,
      .report-year,
      .report-period,
      footer {
        transition: none;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
      }

      .app {
        min-width: 0;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        padding: calc(28px + env(safe-area-inset-top, 0px)) 0 calc(28px + env(safe-area-inset-bottom, 0px));
      }

      .page {
        width: calc(100vw - 28px);
      }

      .masthead {
        min-height: 44px;
        margin-bottom: 34px;
      }

      h1 {
        font-size: 30px;
      }

      .reports {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 42px 18px;
      }

      footer {
        margin-top: 64px;
      }
    }
  </style>
  <script>
    (function () {
      var rad = Math.PI / 180;
      var dayMs = 86400000;
      var J1970 = 2440588;
      var J2000 = 2451545;
      var e = rad * 23.4397;
      var rootStyle = document.documentElement.style;
      var themeMeta = document.querySelector('meta[name="theme-color"]');
      var activeVars = {};
      var debugTime = parseDebugTime();
      var locationState = {
        lat: 31.2304,
        lon: 121.4737,
        timeZone: "Asia/Shanghai"
      };
      var themeTimer = 0;
      var palettes = {
        night: {
          skyTop: "#060815",
          skyMid: "#101b31",
          ground: "#07101d",
          text: "#f4f7fb",
          muted: "#a8b4c5",
          surface: "#111a29",
          line: "#c6d6ee",
          accent: "#8bd3ff",
          glow: "#d4e4ff",
          moon: "#d7e6ff",
          horizon: "#233d62",
          counter: "#162845"
        },
        dawn: {
          skyTop: "#607ea2",
          skyMid: "#e8ad86",
          ground: "#eef1df",
          text: "#21313b",
          muted: "#5e6d78",
          surface: "#fff8ec",
          line: "#6d746c",
          accent: "#d47442",
          glow: "#ffd69a",
          moon: "#e6efff",
          horizon: "#fff0d5",
          counter: "#7aa6bd"
        },
        day: {
          skyTop: "#89cef5",
          skyMid: "#f7fbff",
          ground: "#e8f2df",
          text: "#1d2d35",
          muted: "#586875",
          surface: "#ffffff",
          line: "#39515a",
          accent: "#c56a3a",
          glow: "#fff1b8",
          moon: "#eef5ff",
          horizon: "#ffffff",
          counter: "#75bce4"
        },
        dusk: {
          skyTop: "#354965",
          skyMid: "#c87963",
          ground: "#1b2531",
          text: "#fff5ec",
          muted: "#ccb1a6",
          surface: "#1a2431",
          line: "#f1ccb9",
          accent: "#ffb36d",
          glow: "#ffbf7a",
          moon: "#dce8ff",
          horizon: "#ffd0bd",
          counter: "#55637d"
        }
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function parseDebugTime() {
        var value = new URLSearchParams(location.search).get("time");
        var date = value ? new Date(value) : null;
        return date && Number.isFinite(date.valueOf()) ? date : null;
      }

      function getThemeTime() {
        return debugTime || new Date();
      }

      function toJulian(date) {
        return date.valueOf() / dayMs - .5 + J1970;
      }

      function fromJulian(j) {
        return new Date((j + .5 - J1970) * dayMs);
      }

      function toDays(date) {
        return toJulian(date) - J2000;
      }

      function declination(l, b) {
        return Math.asin(Math.sin(b) * Math.cos(e) + Math.cos(b) * Math.sin(e) * Math.sin(l));
      }

      function solarMeanAnomaly(d) {
        return rad * (357.5291 + .98560028 * d);
      }

      function eclipticLongitude(M) {
        var C = rad * (1.9148 * Math.sin(M) + .02 * Math.sin(2 * M) + .0003 * Math.sin(3 * M));
        return M + C + rad * 102.9372 + Math.PI;
      }

      function julianCycle(d, lw) {
        return Math.round(d - .0009 - lw / (2 * Math.PI));
      }

      function approxTransit(Ht, lw, n) {
        return .0009 + (Ht + lw) / (2 * Math.PI) + n;
      }

      function solarTransitJ(ds, M, L) {
        return J2000 + ds + .0053 * Math.sin(M) - .0069 * Math.sin(2 * L);
      }

      function hourAngle(horizon, phi, dec) {
        return Math.acos((Math.sin(horizon) - Math.sin(phi) * Math.sin(dec)) / (Math.cos(phi) * Math.cos(dec)));
      }

      function getSunTimes(date, lat, lon) {
        var lw = rad * -lon;
        var phi = rad * lat;
        var d = toDays(date);
        var n = julianCycle(d, lw);
        var ds = approxTransit(0, lw, n);
        var M = solarMeanAnomaly(ds);
        var L = eclipticLongitude(M);
        var dec = declination(L, 0);
        var Jnoon = solarTransitJ(ds, M, L);
        var Jset = solarTransitJ(approxTransit(hourAngle(-.833 * rad, phi, dec), lw, n), M, L);
        var Jrise = Jnoon - (Jset - Jnoon);

        if (![Jrise, Jnoon, Jset].every(Number.isFinite)) {
          var fallback = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(), 0));
          return {
            sunrise: new Date(fallback.getTime() + 6 * 60 * 60 * 1000),
            sunset: new Date(fallback.getTime() + 18 * 60 * 60 * 1000)
          };
        }

        return {
          sunrise: fromJulian(Jrise),
          sunset: fromJulian(Jset)
        };
      }

      function getZonedParts(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("en-CA", {
          timeZone: timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        });
        var values = {};
        formatter.formatToParts(date).forEach(function (part) {
          values[part.type] = part.value;
        });
        return {
          year: Number(values.year),
          month: Number(values.month),
          day: Number(values.day)
        };
      }

      function getTimesForZonedDate(now, location, offsetDays) {
        var parts = getZonedParts(now, location.timeZone);
        var localNoon = new Date(Date.UTC(parts.year, parts.month - 1, parts.day + offsetDays, 12));
        return getSunTimes(localNoon, location.lat, location.lon);
      }

      function hexToRgb(hex) {
        var raw = hex.replace("#", "");
        return {
          r: parseInt(raw.slice(0, 2), 16),
          g: parseInt(raw.slice(2, 4), 16),
          b: parseInt(raw.slice(4, 6), 16)
        };
      }

      function toLinearChannel(value) {
        var channel = value / 255;
        return channel <= .03928 ? channel / 12.92 : Math.pow((channel + .055) / 1.055, 2.4);
      }

      function luminance(hex) {
        var rgb = hexToRgb(hex);
        return .2126 * toLinearChannel(rgb.r) + .7152 * toLinearChannel(rgb.g) + .0722 * toLinearChannel(rgb.b);
      }

      function rgbToHex(rgb) {
        return "#" + [rgb.r, rgb.g, rgb.b].map(function (part) {
          return Math.round(part).toString(16).padStart(2, "0");
        }).join("");
      }

      function mixColor(a, b, t) {
        var ca = hexToRgb(a);
        var cb = hexToRgb(b);
        return rgbToHex({
          r: ca.r + (cb.r - ca.r) * t,
          g: ca.g + (cb.g - ca.g) * t,
          b: ca.b + (cb.b - ca.b) * t
        });
      }

      function mixPalette(a, b, t) {
        var palette = {};
        Object.keys(a).forEach(function (key) {
          palette[key] = mixColor(a[key], b[key], t);
        });
        return palette;
      }

      function rgbCsv(hex) {
        var rgb = hexToRgb(hex);
        return rgb.r + ", " + rgb.g + ", " + rgb.b;
      }

      function midpoint(start, end) {
        return new Date((start.valueOf() + end.valueOf()) / 2);
      }

      function progressBetween(now, start, end) {
        return clamp((now - start) / (end - start), 0, 1);
      }

      function linearTheme(from, to, progress, fromLight, toLight, fromX, toX, fromY, toY) {
        return {
          light: fromLight + (toLight - fromLight) * progress,
          sunX: fromX + (toX - fromX) * progress,
          sunY: fromY + (toY - fromY) * progress,
          palette: mixPalette(from, to, progress)
        };
      }

      function withMoon(model) {
        model.moonX = 100 - model.sunX;
        model.moonY = clamp(112 - model.sunY, 8, 70);
        return model;
      }

      function buildSolarModel(now, location) {
        var today = getTimesForZonedDate(now, location, 0);
        var previous = getTimesForZonedDate(now, location, -1);
        var next = getTimesForZonedDate(now, location, 1);
        var isDay = now >= today.sunrise && now < today.sunset;

        if (isDay) {
          var noon = midpoint(today.sunrise, today.sunset);
          if (now < noon) {
            return withMoon(linearTheme(palettes.dawn, palettes.day, progressBetween(now, today.sunrise, noon), .35, 1, 22, 50, 62, 18));
          }
          return withMoon(linearTheme(palettes.day, palettes.dusk, progressBetween(now, noon, today.sunset), 1, .74, 50, 78, 18, 64));
        }

        var nightStart = now < today.sunrise ? previous.sunset : today.sunset;
        var nightEnd = now < today.sunrise ? today.sunrise : next.sunrise;
        var nightMiddle = midpoint(nightStart, nightEnd);
        if (now < nightMiddle) {
          return withMoon(linearTheme(palettes.dusk, palettes.night, progressBetween(now, nightStart, nightMiddle), .74, .05, 78, 50, 64, 112));
        }
        return withMoon(linearTheme(palettes.night, palettes.dawn, progressBetween(now, nightMiddle, nightEnd), .05, .35, 50, 22, 112, 62));
      }

      function setThemeVars(model) {
        var p = model.palette;
        var glow = clamp(.045 + model.light * .235, .045, .28);
        var sunStrength = clamp((model.light - .28) / .72, 0, 1);
        var moonStrength = clamp((.42 - model.light) / .42, 0, 1);
        var surfaceIsLight = luminance(p.surface) > .42;
        var vars = {
          "--sky-top": p.skyTop,
          "--sky-mid": p.skyMid,
          "--ground": p.ground,
          "--page-text": p.text,
          "--muted-text": p.muted,
          "--meta-text": surfaceIsLight ? "#1c2a33" : "#f8fbff",
          "--meta-muted-text": surfaceIsLight ? "#3f4d58" : "#c8d6e8",
          "--surface-rgb": rgbCsv(p.surface),
          "--line-rgb": rgbCsv(p.line),
          "--surface-alpha": String(clamp(.62 + (1 - model.light) * .18, .62, .84).toFixed(3)),
          "--line-alpha": String(clamp(.13 + (1 - model.light) * .1, .13, .26).toFixed(3)),
          "--accent": p.accent,
          "--solar-rgb": rgbCsv(p.glow),
          "--moon-rgb": rgbCsv(p.moon),
          "--horizon-rgb": rgbCsv(p.horizon),
          "--counter-rgb": rgbCsv(p.counter),
          "--glow-alpha": String((glow + sunStrength * .045 + moonStrength * .025).toFixed(3)),
          "--glow-soft-alpha": String((glow * .34 + sunStrength * .018 + moonStrength * .022).toFixed(3)),
          "--sun-disc-alpha": String((sunStrength * .18).toFixed(3)),
          "--moon-disc-alpha": "0",
          "--moon-halo-alpha": String((moonStrength * .115).toFixed(3)),
          "--counter-alpha": String(clamp(.018 + model.light * .047, .018, .065).toFixed(3)),
          "--arc-alpha": String(clamp(.006 + model.light * .019, .006, .025).toFixed(3)),
          "--grain-alpha": String(clamp(.006 + (1 - model.light) * .012, .006, .018).toFixed(3)),
          "--veil-alpha": String(clamp(.04 + model.light * .14, .04, .18).toFixed(3)),
          "--beam-alpha": String(clamp(.006 + model.light * .017, .006, .023).toFixed(3)),
          "--horizon-alpha": String(clamp(.05 + model.light * .11, .05, .16).toFixed(3)),
          "--vignette-alpha": String(clamp(.045 + (1 - model.light) * .09, .045, .135).toFixed(3)),
          "--atmosphere-x": model.sunX.toFixed(2) + "%",
          "--atmosphere-y": model.sunY.toFixed(2) + "%",
          "--moon-x": model.moonX.toFixed(2) + "%",
          "--moon-y": model.moonY.toFixed(2) + "%"
        };

        if (themeMeta && themeMeta.content !== p.skyTop) {
          themeMeta.content = p.skyTop;
        }

        Object.keys(vars).forEach(function (name) {
          if (activeVars[name] !== vars[name]) {
            activeVars[name] = vars[name];
            rootStyle.setProperty(name, vars[name]);
          }
        });
      }

      function applyTheme() {
        setThemeVars(buildSolarModel(getThemeTime(), locationState));
      }

      function scheduleTheme() {
        clearTimeout(themeTimer);
        if (document.visibilityState === "hidden") {
          return;
        }
        applyTheme();
        if (debugTime) {
          return;
        }
        themeTimer = setTimeout(scheduleTheme, 60000 - Date.now() % 60000);
      }

      function idle(callback) {
        (window.requestIdleCallback || function (run) {
          setTimeout(run, 1200);
        })(callback);
      }

      applyTheme();

      document.addEventListener("visibilitychange", scheduleTheme, { passive: true });
      addEventListener("pageshow", scheduleTheme, { passive: true });
      addEventListener("DOMContentLoaded", function () {
        var report2026 = document.getElementById("r2026");
        function updateReportVersion() {
          var stamp = new Date();
          var version = stamp.getFullYear() + String(stamp.getMonth() + 1).padStart(2, "0") + String(stamp.getDate()).padStart(2, "0");
          report2026.href = "2026_Annual_Report.pdf?v=" + version;
        }

        if (report2026) {
          updateReportVersion();
          report2026.addEventListener("pointerdown", updateReportVersion, { passive: true });
          report2026.addEventListener("focus", updateReportVersion, { passive: true });
        }

        idle(function () {
          if (!navigator.geolocation || !navigator.permissions) {
            return;
          }
          navigator.permissions.query({ name: "geolocation" }).then(function (permission) {
            if (permission.state !== "granted") {
              return;
            }
            navigator.geolocation.getCurrentPosition(function (position) {
              locationState = {
                lat: position.coords.latitude,
                lon: position.coords.longitude,
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC"
              };
              scheduleTheme();
            }, function () {}, {
              enableHighAccuracy: false,
              maximumAge: 30 * 60 * 1000,
              timeout: 7000
            });
          }).catch(function () {});
        });

        idle(function () {
          var script = document.createElement("script");
          script.async = true;
          script.src = "https://www.googletagmanager.com/gtag/js?id=G-VMYN05WBBT";
          document.head.appendChild(script);
