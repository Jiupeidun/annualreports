<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Annual Reports">
  <meta name="theme-color" content="#060815">
  <title>Financial Reports</title>
  <link rel="icon" href="favicon.ico">
  <style>
    :root {
      --page-w: 1120px;
      --edge: 40px;
      --radius: 8px;
      --sky-base: #070913;
      --sky-top: #070913;
      --sky-mid: #171d2b;
      --ground: #090b10;
      --page-text: #f4f7fb;
      --muted-text: #a8b4c5;
      --meta-text: #f8fbff;
      --meta-muted-text: #c6d3e2;
      --surface-rgb: 17, 26, 41;
      --line-rgb: 198, 214, 238;
      --surface-alpha: .8;
      --line-alpha: .23;
      --accent: #8bd3ff;
      --ambient-rgb: 77, 85, 104;
      --mist-rgb: 185, 196, 214;
      --sheen-rgb: 120, 163, 200;
      --fluid-a-rgb: 97, 114, 216;
      --fluid-b-rgb: 37, 184, 165;
      --fluid-c-rgb: 192, 106, 134;
      --fluid-a-alpha: .145;
      --fluid-a-soft-alpha: .045;
      --fluid-b-alpha: .13;
      --fluid-b-soft-alpha: .04;
      --fluid-c-alpha: .12;
      --fluid-c-soft-alpha: .038;
      --mist-alpha: .022;
      --sheen-alpha: .03;
      --horizon-alpha: .07;
      --grain-alpha: .012;
      --vignette-alpha: .1;
      --glow-layer-opacity: .46;
      --texture-layer-opacity: .58;
      --fluid-a-x: 18%;
      --fluid-a-y: 24%;
      --fluid-b-x: 78%;
      --fluid-b-y: 32%;
      --fluid-c-x: 50%;
      --fluid-c-y: 76%;
      --atmosphere-background:
        radial-gradient(115% 72% at 50% 112%, rgba(var(--ambient-rgb), var(--horizon-alpha)) 0%, transparent 66%),
        radial-gradient(90% 66% at var(--fluid-a-x) var(--fluid-a-y), rgba(var(--fluid-a-rgb), var(--fluid-a-alpha)) 0%, rgba(var(--fluid-a-rgb), var(--fluid-a-soft-alpha)) 42%, transparent 78%),
        radial-gradient(78% 62% at var(--fluid-b-x) var(--fluid-b-y), rgba(var(--fluid-b-rgb), var(--fluid-b-alpha)) 0%, rgba(var(--fluid-b-rgb), var(--fluid-b-soft-alpha)) 46%, transparent 82%),
        radial-gradient(96% 70% at var(--fluid-c-x) var(--fluid-c-y), rgba(var(--fluid-c-rgb), var(--fluid-c-alpha)) 0%, rgba(var(--fluid-c-rgb), var(--fluid-c-soft-alpha)) 44%, transparent 80%),
        linear-gradient(126deg, rgba(var(--sheen-rgb), var(--sheen-alpha)) 0%, transparent 44%),
        linear-gradient(180deg, rgba(var(--mist-rgb), var(--mist-alpha)) 0%, transparent 38%),
        linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--ground) 100%);
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-weight: 300;
      font-synthesis: none;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--sky-base);
    }

    body {
      position: relative;
      min-height: 100%;
      min-height: 100dvh;
      margin: 0;
      overflow-x: auto;
      background: var(--sky-base);
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 0;
      pointer-events: none;
      background: var(--atmosphere-background);
      transition: background 900ms linear;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      position: relative;
      isolation: isolate;
      z-index: 1;
      overflow: hidden;
      min-width: calc(var(--page-w) + (var(--edge) * 2));
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: calc(var(--edge) + env(safe-area-inset-top, 0px)) 0 calc(var(--edge) + env(safe-area-inset-bottom, 0px));
      color: var(--page-text);
      background: transparent;
      transition: color 700ms linear;
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .app::before {
      inset: -12%;
      background:
        radial-gradient(96% 74% at var(--fluid-a-x) var(--fluid-a-y), rgba(var(--fluid-a-rgb), var(--fluid-a-soft-alpha)) 0%, transparent 72%),
        radial-gradient(88% 70% at var(--fluid-b-x) var(--fluid-b-y), rgba(var(--fluid-b-rgb), var(--fluid-b-soft-alpha)) 0%, transparent 74%),
        radial-gradient(112% 78% at var(--fluid-c-x) var(--fluid-c-y), rgba(var(--fluid-c-rgb), var(--fluid-c-soft-alpha)) 0%, transparent 76%);
      filter: blur(48px) saturate(1.08);
      mix-blend-mode: screen;
      opacity: var(--glow-layer-opacity);
      transform: translateZ(0) scale(1.03);
    }

    .app::after {
      background:
        radial-gradient(130% 88% at 50% 112%, rgba(0, 0, 0, var(--vignette-alpha)) 0%, transparent 62%),
        linear-gradient(180deg, rgba(var(--mist-rgb), var(--mist-alpha)) 0%, transparent 40%),
        repeating-linear-gradient(104deg, rgba(var(--mist-rgb), var(--grain-alpha)) 0 1px, transparent 1px 8px);
      mix-blend-mode: soft-light;
      opacity: var(--texture-layer-opacity);
    }

    .page {
      width: var(--page-w);
      margin: 0 auto;
    }

    .masthead {
      min-height: 56px;
      display: grid;
      place-items: center;
      margin-bottom: 56px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1.2;
      font-weight: 300;
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
    }

    .reports {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 56px 24px;
    }

    .report-link {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto;
      gap: 18px;
      contain: layout paint style;
      color: var(--page-text);
      transition: color 700ms linear;
    }

    .report-link:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 52%, transparent);
      outline-offset: 4px;
      border-radius: var(--radius);
    }

    .report-picture {
      display: block;
      min-width: 0;
    }

    .report-cover {
      width: 144px;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      display: block;
      border-radius: var(--radius);
      background: rgba(var(--surface-rgb), var(--surface-alpha));
      transition: background 700ms linear;
    }

    .report-meta {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .report-year {
      display: block;
      color: var(--meta-text);
      font-size: 1.08rem;
      font-weight: 300;
      line-height: 1.1;
      text-shadow: 0 1px 10px rgba(0, 0, 0, .12);
      transition: color 700ms linear;
    }

    .report-period {
      display: block;
      margin-top: 6px;
      color: var(--meta-muted-text);
      font-size: .76rem;
      font-weight: 300;
      line-height: 1.3;
      text-shadow: 0 1px 8px rgba(0, 0, 0, .1);
      transition: color 700ms linear;
      white-space: nowrap;
    }

    .report-link:hover .report-year,
    .report-link:focus-visible .report-year {
      color: var(--meta-text);
    }

    .report-link:hover .report-period,
    .report-link:focus-visible .report-period {
      color: var(--meta-text);
    }

    footer {
      margin-top: 80px;
      color: var(--muted-text);
      font-size: .75rem;
      line-height: 1.35;
      opacity: .58;
      text-align: center;
      transition: color 700ms linear;
    }

    footer p {
      margin: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      .app,
      .report-link,
      .report-cover,
      .report-year,
      .report-period,
      footer {
        transition: none;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
      }

      .app {
        min-width: 0;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        padding: calc(28px + env(safe-area-inset-top, 0px)) 0 calc(28px + env(safe-area-inset-bottom, 0px));
      }

      .page {
        width: calc(100vw - 28px);
      }

      .masthead {
        min-height: 44px;
        margin-bottom: 34px;
      }

      h1 {
        font-size: 30px;
      }

      .reports {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 42px 18px;
      }

      footer {
        margin-top: 64px;
      }
    }
  </style>
  <script>
    (function () {
      var rad = Math.PI / 180;
      var dayMs = 86400000;
      var J1970 = 2440588;
      var J2000 = 2451545;
      var e = rad * 23.4397;
      var rootStyle = document.documentElement.style;
      var themeMeta = document.querySelector('meta[name="theme-color"]');
      var activeVars = {};
      var debugTime = parseDebugTime();
      var locationState = {
        lat: 31.2304,
        lon: 121.4737,
        timeZone: "Asia/Shanghai"
      };
      var themeTimer = 0;
      var palettes = {
        night: {
          skyBase: "#070913",
          skyTop: "#070913",
          skyMid: "#171d2b",
          ground: "#090b10",
          text: "#f4f7fb",
          muted: "#a8b4c5",
          surface: "#11161f",
          line: "#cad4e8",
          accent: "#8bd7cf",
          ambient: "#4d5568",
          mist: "#b9c4d6",
          sheen: "#78a3c8",
          fluidA: "#6172d8",
          fluidB: "#25b8a5",
          fluidC: "#c06a86"
        },
        dawn: {
          skyBase: "#eef2ef",
          skyTop: "#8399b2",
          skyMid: "#e5b89d",
          ground: "#eef0e4",
          text: "#22313a",
          muted: "#66727a",
          surface: "#fff8ee",
          line: "#69776f",
          accent: "#d5714a",
          ambient: "#efc9b6",
          mist: "#fff7e9",
          sheen: "#cde9e6",
          fluidA: "#83b8d9",
          fluidB: "#f0a073",
          fluidC: "#b69ee7"
        },
        day: {
          skyBase: "#f4f8f7",
          skyTop: "#9fd6eb",
          skyMid: "#f4fbff",
          ground: "#e9f0e7",
          text: "#1f3038",
          muted: "#586a73",
          surface: "#ffffff",
          line: "#40575e",
          accent: "#c56a3a",
          ambient: "#dcefe5",
          mist: "#ffffff",
          sheen: "#d4f1f2",
          fluidA: "#70c7db",
          fluidB: "#88d5af",
          fluidC: "#ee9a72"
        },
        dusk: {
          skyBase: "#1b202a",
          skyTop: "#425067",
          skyMid: "#b27070",
          ground: "#171b20",
          text: "#fff5ec",
          muted: "#cfb8ad",
          surface: "#1b222b",
          line: "#f0c5b8",
          accent: "#ffb06a",
          ambient: "#9e5f72",
          mist: "#ffd9cb",
          sheen: "#d7b1e6",
          fluidA: "#7f89d6",
          fluidB: "#ed8f70",
          fluidC: "#4ec1b4"
        }
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function parseDebugTime() {
        var value = new URLSearchParams(location.search).get("time");
        var date = value ? new Date(value) : null;
        return date && Number.isFinite(date.valueOf()) ? date : null;
      }

      function getThemeTime() {
        return debugTime || new Date();
      }

      function toJulian(date) {
        return date.valueOf() / dayMs - .5 + J1970;
      }

      function fromJulian(j) {
        return new Date((j + .5 - J1970) * dayMs);
      }

      function toDays(date) {
        return toJulian(date) - J2000;
      }

      function declination(l, b) {
        return Math.asin(Math.sin(b) * Math.cos(e) + Math.cos(b) * Math.sin(e) * Math.sin(l));
      }

      function solarMeanAnomaly(d) {
        return rad * (357.5291 + .98560028 * d);
      }

      function eclipticLongitude(M) {
        var C = rad * (1.9148 * Math.sin(M) + .02 * Math.sin(2 * M) + .0003 * Math.sin(3 * M));
        return M + C + rad * 102.9372 + Math.PI;
      }

      function julianCycle(d, lw) {
        return Math.round(d - .0009 - lw / (2 * Math.PI));
      }

      function approxTransit(Ht, lw, n) {
        return .0009 + (Ht + lw) / (2 * Math.PI) + n;
      }

      function solarTransitJ(ds, M, L) {
        return J2000 + ds + .0053 * Math.sin(M) - .0069 * Math.sin(2 * L);
      }

      function hourAngle(horizon, phi, dec) {
        return Math.acos((Math.sin(horizon) - Math.sin(phi) * Math.sin(dec)) / (Math.cos(phi) * Math.cos(dec)));
      }

      function getSunTimes(date, lat, lon) {
        var lw = rad * -lon;
        var phi = rad * lat;
        var d = toDays(date);
        var n = julianCycle(d, lw);
        var ds = approxTransit(0, lw, n);
        var M = solarMeanAnomaly(ds);
        var L = eclipticLongitude(M);
        var dec = declination(L, 0);
        var Jnoon = solarTransitJ(ds, M, L);
        var Jset = solarTransitJ(approxTransit(hourAngle(-.833 * rad, phi, dec), lw, n), M, L);
        var Jrise = Jnoon - (Jset - Jnoon);

        if (![Jrise, Jnoon, Jset].every(Number.isFinite)) {
          var fallback = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(), 0));
          return {
            sunrise: new Date(fallback.getTime() + 6 * 60 * 60 * 1000),
            sunset: new Date(fallback.getTime() + 18 * 60 * 60 * 1000)
          };
        }

        return {
          sunrise: fromJulian(Jrise),
          sunset: fromJulian(Jset)
        };
      }

      function getZonedParts(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("en-CA", {
          timeZone: timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        });
        var values = {};
        formatter.formatToParts(date).forEach(function (part) {
          values[part.type] = part.value;
        });
        return {
          year: Number(values.year),
          month: Number(values.month),
          day: Number(values.day)
        };
      }

      function getTimesForZonedDate(now, location, offsetDays) {
        var parts = getZonedParts(now, location.timeZone);
        var localNoon = new Date(Date.UTC(parts.year, parts.month - 1, parts.day + offsetDays, 12));
        return getSunTimes(localNoon, location.lat, location.lon);
      }

      function hexToRgb(hex) {
        var raw = hex.replace("#", "");
        return {
          r: parseInt(raw.slice(0, 2), 16),
          g: parseInt(raw.slice(2, 4), 16),
          b: parseInt(raw.slice(4, 6), 16)
        };
      }

      function toLinearChannel(value) {
        var channel = value / 255;
        return channel <= .03928 ? channel / 12.92 : Math.pow((channel + .055) / 1.055, 2.4);
      }

      function luminance(hex) {
        var rgb = hexToRgb(hex);
        return .2126 * toLinearChannel(rgb.r) + .7152 * toLinearChannel(rgb.g) + .0722 * toLinearChannel(rgb.b);
      }

      function rgbToHex(rgb) {
        return "#" + [rgb.r, rgb.g, rgb.b].map(function (part) {
          return Math.round(part).toString(16).padStart(2, "0");
        }).join("");
      }

      function mixColor(a, b, t) {
        var ca = hexToRgb(a);
        var cb = hexToRgb(b);
        return rgbToHex({
          r: ca.r + (cb.r - ca.r) * t,
          g: ca.g + (cb.g - ca.g) * t,
          b: ca.b + (cb.b - ca.b) * t
        });
      }

      function mixPalette(a, b, t) {
        var palette = {};
        Object.keys(a).forEach(function (key) {
          palette[key] = mixColor(a[key], b[key], t);
        });
        return palette;
      }

      function rgbCsv(hex) {
        var rgb = hexToRgb(hex);
        return rgb.r + ", " + rgb.g + ", " + rgb.b;
      }

      function midpoint(start, end) {
        return new Date((start.valueOf() + end.valueOf()) / 2);
      }

      function progressBetween(now, start, end) {
        return clamp((now - start) / (end - start), 0, 1);
      }

      function linearTheme(from, to, progress, fromLight, toLight, fromFlow, toFlow) {
        return {
          light: fromLight + (toLight - fromLight) * progress,
          flow: fromFlow + (toFlow - fromFlow) * progress,
          palette: mixPalette(from, to, progress)
        };
      }

      function withFluidFields(model) {
        var angle = model.flow * Math.PI * 2;
        var nightLift = 1 - model.light;
        model.fluidAX = clamp(24 + Math.cos(angle * .76) * 10, 10, 42);
        model.fluidAY = clamp(24 + Math.sin(angle * .9) * 12 + nightLift * 6, 8, 48);
        model.fluidBX = clamp(74 + Math.sin(angle * .72 + 1.4) * 12, 55, 92);
        model.fluidBY = clamp(32 + Math.cos(angle * .86 + .6) * 16, 12, 58);
        model.fluidCX = clamp(50 + Math.cos(angle * .54 + 2.5) * 16, 28, 72);
        model.fluidCY = clamp(78 + Math.sin(angle * .68 + 2.1) * 8 - model.light * 6, 58, 90);
        return model;
      }

      function buildAtmosphereModel(now, location) {
        var today = getTimesForZonedDate(now, location, 0);
        var previous = getTimesForZonedDate(now, location, -1);
        var next = getTimesForZonedDate(now, location, 1);
        var isDay = now >= today.sunrise && now < today.sunset;

        if (isDay) {
          var noon = midpoint(today.sunrise, today.sunset);
          if (now < noon) {
            return withFluidFields(linearTheme(palettes.dawn, palettes.day, progressBetween(now, today.sunrise, noon), .35, 1, .08, .38));
          }
          return withFluidFields(linearTheme(palettes.day, palettes.dusk, progressBetween(now, noon, today.sunset), 1, .74, .38, .62));
        }

        var nightStart = now < today.sunrise ? previous.sunset : today.sunset;
        var nightEnd = now < today.sunrise ? today.sunrise : next.sunrise;
        var nightMiddle = midpoint(nightStart, nightEnd);
        if (now < nightMiddle) {
          return withFluidFields(linearTheme(palettes.dusk, palettes.night, progressBetween(now, nightStart, nightMiddle), .74, .05, .62, .82));
        }
        return withFluidFields(linearTheme(palettes.night, palettes.dawn, progressBetween(now, nightMiddle, nightEnd), .05, .35, .82, 1.08));
      }

      function setThemeVars(model) {
        var p = model.palette;
        var surfaceIsLight = luminance(p.surface) > .42;
        var vars = {
          "--sky-base": p.skyBase,
          "--sky-top": p.skyTop,
          "--sky-mid": p.skyMid,
          "--ground": p.ground,
          "--page-text": p.text,
          "--muted-text": p.muted,
          "--meta-text": surfaceIsLight ? "#1c2a33" : "#f8fbff",
          "--meta-muted-text": surfaceIsLight ? "#3f4d58" : "#c8d6e8",
          "--surface-rgb": rgbCsv(p.surface),
          "--line-rgb": rgbCsv(p.line),
          "--surface-alpha": String(clamp(.62 + (1 - model.light) * .18, .62, .84).toFixed(3)),
          "--line-alpha": String(clamp(.13 + (1 - model.light) * .1, .13, .26).toFixed(3)),
          "--accent": p.accent,
          "--ambient-rgb": rgbCsv(p.ambient),
          "--mist-rgb": rgbCsv(p.mist),
          "--sheen-rgb": rgbCsv(p.sheen),
          "--fluid-a-rgb": rgbCsv(p.fluidA),
          "--fluid-b-rgb": rgbCsv(p.fluidB),
          "--fluid-c-rgb": rgbCsv(p.fluidC),
          "--fluid-a-alpha": String(clamp(.115 + model.light * .075, .115, .19).toFixed(3)),
          "--fluid-a-soft-alpha": String(clamp(.038 + model.light * .032, .038, .07).toFixed(3)),
          "--fluid-b-alpha": String(clamp(.105 + model.light * .065, .105, .17).toFixed(3)),
          "--fluid-b-soft-alpha": String(clamp(.034 + model.light * .03, .034, .064).toFixed(3)),
          "--fluid-c-alpha": String(clamp(.1 + model.light * .055, .1, .155).toFixed(3)),
          "--fluid-c-soft-alpha": String(clamp(.032 + model.light * .026, .032, .058).toFixed(3)),
          "--mist-alpha": String(clamp(.018 + model.light * .04, .018, .058).toFixed(3)),
          "--sheen-alpha": String(clamp(.02 + model.light * .055, .02, .075).toFixed(3)),
          "--horizon-alpha": String(clamp(.06 + model.light * .08, .06, .14).toFixed(3)),
          "--grain-alpha": String(clamp(.006 + (1 - model.light) * .012, .006, .018).toFixed(3)),
          "--vignette-alpha": String(clamp(.035 + (1 - model.light) * .095, .035, .13).toFixed(3)),
          "--glow-layer-opacity": String(clamp(.34 + model.light * .26, .34, .6).toFixed(3)),
          "--texture-layer-opacity": String(clamp(.44 + (1 - model.light) * .22, .44, .66).toFixed(3)),
          "--fluid-a-x": model.fluidAX.toFixed(2) + "%",
          "--fluid-a-y": model.fluidAY.toFixed(2) + "%",
          "--fluid-b-x": model.fluidBX.toFixed(2) + "%",
          "--fluid-b-y": model.fluidBY.toFixed(2) + "%",
          "--fluid-c-x": model.fluidCX.toFixed(2) + "%",
          "--fluid-c-y": model.fluidCY.toFixed(2) + "%"
        };

        if (themeMeta && themeMeta.content !== p.skyTop) {
          themeMeta.content = p.skyTop;
        }

        Object.keys(vars).forEach(function (name) {
          if (activeVars[name] !== vars[name]) {
            activeVars[name] = vars[name];
            rootStyle.setProperty(name, vars[name]);
          }
        });
      }

      function applyTheme() {
        setThemeVars(buildAtmosphereModel(getThemeTime(), locationState));
      }

      function scheduleTheme() {
        clearTimeout(themeTimer);
        if (document.visibilityState === "hidden") {
          return;
        }
        applyTheme();
        if (debugTime) {
          return;
        }
        themeTimer = setTimeout(scheduleTheme, 60000 - Date.now() % 60000);
      }

      function idle(callback) {
        (window.requestIdleCallback || function (run) {
          setTimeout(run, 1200);
        })(callback);
