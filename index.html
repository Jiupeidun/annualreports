<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Annual Reports">
  <title>Financial Reports</title>
  <link rel="icon" href="favicon.ico">
  <style>
    :root {
      --page-w: 1120px;
      --edge: 40px;
      --radius: 8px;
      --sky-top: #060815;
      --sky-mid: #101b31;
      --ground: #07101d;
      --page-text: #f4f7fb;
      --muted-text: #a8b4c5;
      --surface-rgb: 17, 26, 41;
      --line-rgb: 198, 214, 238;
      --surface-alpha: .8;
      --line-alpha: .23;
      --accent: #8bd3ff;
      color-scheme: light dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
      font-synthesis: none;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--ground);
    }

    body {
      min-height: 100%;
      margin: 0;
      overflow-x: auto;
      background: var(--ground);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      min-width: calc(var(--page-w) + (var(--edge) * 2));
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: var(--edge) 0;
      color: var(--page-text);
      background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 48%, var(--ground) 100%);
      transition: background 900ms linear, color 700ms linear;
    }

    .page {
      width: var(--page-w);
      margin: 0 auto;
    }

    .masthead {
      min-height: 56px;
      display: grid;
      place-items: center;
      margin-bottom: 56px;
    }

    h1 {
      margin: 0;
      font-size: 36px;
      line-height: 1.2;
      font-weight: 400;
      letter-spacing: 0;
      text-align: center;
      white-space: nowrap;
    }

    .reports {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 56px 24px;
    }

    .report-link {
      min-width: 0;
      display: grid;
      grid-template-rows: auto auto;
      gap: 16px;
      contain: layout paint style;
      color: var(--page-text);
      transition: color 700ms linear;
    }

    .report-link:focus-visible {
      outline: 3px solid color-mix(in srgb, var(--accent) 52%, transparent);
      outline-offset: 4px;
      border-radius: var(--radius);
    }

    .report-cover {
      width: 144px;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      display: block;
      border-radius: var(--radius);
      background: rgba(var(--surface-rgb), var(--surface-alpha));
      transition: background 700ms linear;
    }

    .report-meta {
      min-width: 0;
      text-align: center;
    }

    .report-year {
      display: block;
      font-size: .94rem;
      font-weight: 560;
      line-height: 1.2;
    }

    .report-period {
      display: block;
      margin-top: 4px;
      color: var(--muted-text);
      font-size: .72rem;
      line-height: 1.3;
      opacity: .72;
      transition: color 700ms linear;
    }

    footer {
      margin-top: 80px;
      color: var(--muted-text);
      font-size: .75rem;
      line-height: 1.35;
      opacity: .58;
      text-align: center;
      transition: color 700ms linear;
    }

    footer p {
      margin: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .app,
      .report-link,
      .report-cover,
      .report-period,
      footer {
        transition: none;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
      }

      .app {
        min-width: 0;
        min-height: 100svh;
        padding: 28px 0;
      }

      .page {
        width: calc(100vw - 28px);
      }

      .masthead {
        min-height: 44px;
        margin-bottom: 34px;
      }

      h1 {
        font-size: 30px;
      }

      .reports {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 42px 18px;
      }

      footer {
        margin-top: 64px;
      }
    }
  </style>
  <script>
    (function () {
      var rad = Math.PI / 180;
      var dayMs = 86400000;
      var J1970 = 2440588;
      var J2000 = 2451545;
      var e = rad * 23.4397;
      var rootStyle = document.documentElement.style;
      var activeVars = {};
      var debugTime = parseDebugTime();
      var locationState = {
        lat: 31.2304,
        lon: 121.4737,
        timeZone: "Asia/Shanghai"
      };
      var themeTimer = 0;
      var palettes = {
        night: {
          skyTop: "#060815",
          skyMid: "#101b31",
          ground: "#07101d",
          text: "#f4f7fb",
          muted: "#a8b4c5",
          surface: "#111a29",
          line: "#c6d6ee",
          accent: "#8bd3ff"
        },
        dawn: {
          skyTop: "#607ea2",
          skyMid: "#e8ad86",
          ground: "#eef1df",
          text: "#21313b",
          muted: "#5e6d78",
          surface: "#fff8ec",
          line: "#6d746c",
          accent: "#d47442"
        },
        day: {
          skyTop: "#89cef5",
          skyMid: "#f7fbff",
          ground: "#e8f2df",
          text: "#1d2d35",
          muted: "#586875",
          surface: "#ffffff",
          line: "#39515a",
          accent: "#c56a3a"
        },
        dusk: {
          skyTop: "#354965",
          skyMid: "#c87963",
          ground: "#1b2531",
          text: "#fff5ec",
          muted: "#ccb1a6",
          surface: "#1a2431",
          line: "#f1ccb9",
          accent: "#ffb36d"
        }
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function parseDebugTime() {
        var value = new URLSearchParams(location.search).get("time");
        var date = value ? new Date(value) : null;
        return date && Number.isFinite(date.valueOf()) ? date : null;
      }

      function getThemeTime() {
        return debugTime || new Date();
      }

      function toJulian(date) {
        return date.valueOf() / dayMs - .5 + J1970;
      }

      function fromJulian(j) {
        return new Date((j + .5 - J1970) * dayMs);
      }

      function toDays(date) {
        return toJulian(date) - J2000;
      }

      function declination(l, b) {
        return Math.asin(Math.sin(b) * Math.cos(e) + Math.cos(b) * Math.sin(e) * Math.sin(l));
      }

      function solarMeanAnomaly(d) {
        return rad * (357.5291 + .98560028 * d);
      }

      function eclipticLongitude(M) {
        var C = rad * (1.9148 * Math.sin(M) + .02 * Math.sin(2 * M) + .0003 * Math.sin(3 * M));
        return M + C + rad * 102.9372 + Math.PI;
      }

      function julianCycle(d, lw) {
        return Math.round(d - .0009 - lw / (2 * Math.PI));
      }

      function approxTransit(Ht, lw, n) {
        return .0009 + (Ht + lw) / (2 * Math.PI) + n;
      }

      function solarTransitJ(ds, M, L) {
        return J2000 + ds + .0053 * Math.sin(M) - .0069 * Math.sin(2 * L);
      }

      function hourAngle(horizon, phi, dec) {
        return Math.acos((Math.sin(horizon) - Math.sin(phi) * Math.sin(dec)) / (Math.cos(phi) * Math.cos(dec)));
      }

      function getSunTimes(date, lat, lon) {
        var lw = rad * -lon;
        var phi = rad * lat;
        var d = toDays(date);
        var n = julianCycle(d, lw);
        var ds = approxTransit(0, lw, n);
        var M = solarMeanAnomaly(ds);
        var L = eclipticLongitude(M);
        var dec = declination(L, 0);
        var Jnoon = solarTransitJ(ds, M, L);
        var Jset = solarTransitJ(approxTransit(hourAngle(-.833 * rad, phi, dec), lw, n), M, L);
        var Jrise = Jnoon - (Jset - Jnoon);

        if (![Jrise, Jnoon, Jset].every(Number.isFinite)) {
          var fallback = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate(), 0));
          return {
            sunrise: new Date(fallback.getTime() + 6 * 60 * 60 * 1000),
            sunset: new Date(fallback.getTime() + 18 * 60 * 60 * 1000)
          };
        }

        return {
          sunrise: fromJulian(Jrise),
          sunset: fromJulian(Jset)
        };
      }

      function getZonedParts(date, timeZone) {
        var formatter = new Intl.DateTimeFormat("en-CA", {
          timeZone: timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit"
        });
        var values = {};
        formatter.formatToParts(date).forEach(function (part) {
          values[part.type] = part.value;
        });
        return {
          year: Number(values.year),
          month: Number(values.month),
          day: Number(values.day)
        };
      }

      function getTimesForZonedDate(now, location, offsetDays) {
        var parts = getZonedParts(now, location.timeZone);
        var localNoon = new Date(Date.UTC(parts.year, parts.month - 1, parts.day + offsetDays, 12));
        return getSunTimes(localNoon, location.lat, location.lon);
      }

      function hexToRgb(hex) {
        var raw = hex.replace("#", "");
        return {
          r: parseInt(raw.slice(0, 2), 16),
          g: parseInt(raw.slice(2, 4), 16),
          b: parseInt(raw.slice(4, 6), 16)
        };
      }

      function rgbToHex(rgb) {
        return "#" + [rgb.r, rgb.g, rgb.b].map(function (part) {
          return Math.round(part).toString(16).padStart(2, "0");
        }).join("");
      }

      function mixColor(a, b, t) {
        var ca = hexToRgb(a);
        var cb = hexToRgb(b);
        return rgbToHex({
          r: ca.r + (cb.r - ca.r) * t,
          g: ca.g + (cb.g - ca.g) * t,
          b: ca.b + (cb.b - ca.b) * t
        });
      }

      function mixPalette(a, b, t) {
        var palette = {};
        Object.keys(a).forEach(function (key) {
          palette[key] = mixColor(a[key], b[key], t);
        });
        return palette;
      }

      function rgbCsv(hex) {
        var rgb = hexToRgb(hex);
        return rgb.r + ", " + rgb.g + ", " + rgb.b;
      }

      function midpoint(start, end) {
        return new Date((start.valueOf() + end.valueOf()) / 2);
      }

      function progressBetween(now, start, end) {
        return clamp((now - start) / (end - start), 0, 1);
      }

      function linearTheme(from, to, progress, fromLight, toLight) {
        return {
          light: fromLight + (toLight - fromLight) * progress,
          palette: mixPalette(from, to, progress)
        };
      }

      function buildSolarModel(now, location) {
        var today = getTimesForZonedDate(now, location, 0);
        var previous = getTimesForZonedDate(now, location, -1);
        var next = getTimesForZonedDate(now, location, 1);
        var isDay = now >= today.sunrise && now < today.sunset;

        if (isDay) {
          var noon = midpoint(today.sunrise, today.sunset);
          if (now < noon) {
            return linearTheme(palettes.dawn, palettes.day, progressBetween(now, today.sunrise, noon), .35, 1);
          }
          return linearTheme(palettes.day, palettes.dusk, progressBetween(now, noon, today.sunset), 1, .74);
        }

        var nightStart = now < today.sunrise ? previous.sunset : today.sunset;
        var nightEnd = now < today.sunrise ? today.sunrise : next.sunrise;
        var nightMiddle = midpoint(nightStart, nightEnd);
        if (now < nightMiddle) {
          return linearTheme(palettes.dusk, palettes.night, progressBetween(now, nightStart, nightMiddle), .74, .05);
        }
        return linearTheme(palettes.night, palettes.dawn, progressBetween(now, nightMiddle, nightEnd), .05, .35);
      }

      function setThemeVars(model) {
        var p = model.palette;
        var vars = {
          "--sky-top": p.skyTop,
          "--sky-mid": p.skyMid,
          "--ground": p.ground,
          "--page-text": p.text,
          "--muted-text": p.muted,
          "--surface-rgb": rgbCsv(p.surface),
          "--line-rgb": rgbCsv(p.line),
          "--surface-alpha": String(clamp(.62 + (1 - model.light) * .18, .62, .84).toFixed(3)),
          "--line-alpha": String(clamp(.13 + (1 - model.light) * .1, .13, .26).toFixed(3)),
          "--accent": p.accent
        };

        Object.keys(vars).forEach(function (name) {
          if (activeVars[name] !== vars[name]) {
            activeVars[name] = vars[name];
            rootStyle.setProperty(name, vars[name]);
          }
        });
      }

      function applyTheme() {
        setThemeVars(buildSolarModel(getThemeTime(), locationState));
      }

      function scheduleTheme() {
        clearTimeout(themeTimer);
        if (document.visibilityState === "hidden") {
          return;
        }
        applyTheme();
        if (debugTime) {
          return;
        }
        themeTimer = setTimeout(scheduleTheme, 60000 - Date.now() % 60000);
      }

      function idle(callback) {
        (window.requestIdleCallback || function (run) {
          setTimeout(run, 1200);
        })(callback);
      }

      applyTheme();

      document.addEventListener("visibilitychange", scheduleTheme, { passive: true });
      addEventListener("pageshow", scheduleTheme, { passive: true });
      addEventListener("DOMContentLoaded", function () {
        var report2026 = document.getElementById("r2026");
        function updateReportVersion() {
          var stamp = new Date();
          var version = stamp.getFullYear() + String(stamp.getMonth() + 1).padStart(2, "0") + String(stamp.getDate()).padStart(2, "0");
          report2026.href = "2026_Annual_Report.pdf?v=" + version;
        }

        if (report2026) {
          updateReportVersion();
          report2026.addEventListener("pointerdown", updateReportVersion, { passive: true });
          report2026.addEventListener("focus", updateReportVersion, { passive: true });
        }

        idle(function () {
          if (!navigator.geolocation || !navigator.permissions) {
            return;
          }
          navigator.permissions.query({ name: "geolocation" }).then(function (permission) {
            if (permission.state !== "granted") {
              return;
            }
            navigator.geolocation.getCurrentPosition(function (position) {
              locationState = {
                lat: position.coords.latitude,
                lon: position.coords.longitude,
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC"
              };
              scheduleTheme();
            }, function () {}, {
              enableHighAccuracy: false,
              maximumAge: 30 * 60 * 1000,
              timeout: 7000
            });
          }).catch(function () {});
        });

        idle(function () {
          var script = document.createElement("script");
          script.async = true;
          script.src = "https://www.googletagmanager.com/gtag/js?id=G-VMYN05WBBT";
          document.head.appendChild(script);
          window.dataLayer = window.dataLayer || [];
          window.gtag = function () {
            dataLayer.push(arguments);
          };
          window.gtag("js", new Date());
          window.gtag("config", "G-VMYN05WBBT");
        });
      }, { once: true });
    })();
  </script>
</head>
